<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/npool0143-cmyk/poolmedia/refs/heads/main/url-opener/url-opener-favicon.png">
    <title>Lidl Aanbiedingen - JSON naar CSV Converter</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #58a6ff;
            --accent-hover: #1f6feb;
            --tag-bg: #21262d;
            --tag-hover: #262c36;
            --danger-color: #f85149;
            --danger-hover: #da3633;
            --warning-bg: rgba(210, 153, 34, 0.1);
            --warning-border: rgba(210, 153, 34, 0.4);
            --warning-text: #f0883e;
            --success-bg: rgba(46, 160, 67, 0.15);
            --success-border: rgba(46, 160, 67, 0.4);
            --success-text: #3fb950;
            --control-bg: #1f242c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 720px;
            margin: 60px auto;
            padding: 0 20px;
            line-height: 1.5;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 8px;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        .dropzone {
            border: 2px dashed var(--border-color);
            padding: 30px 20px;
            text-align: center;
            background: var(--bg-color);
            cursor: pointer;
            border-radius: 8px;
            transition: border-color 0.2s, background-color 0.2s;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .dropzone:hover {
            border-color: var(--accent-color);
            background-color: var(--tag-hover);
            color: #ffffff;
        }

        textarea {
            width: 100%;
            height: 180px;
            background-color: var(--bg-color);
            color: #ecf2f8;
            font-family: monospace;
            padding: 16px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .counter-badge {
            background-color: #21262d;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            font-weight: 500;
            color: var(--accent-color);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s, border-color 0.2s;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            flex: 2;
        }

        .btn-primary:hover { background-color: var(--accent-hover); }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            flex: 1;
        }

        .btn-secondary:hover {
            color: #ffffff;
            background-color: #21262d;
            border-color: #8b949e;
        }

        button:active { transform: scale(0.99); }

        /* Report & Warning Styles */
        .report-box {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
            animation: fadeIn 0.2s ease-in-out;
        }

        .report-success {
            background-color: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success-text);
        }

        .report-error {
            background-color: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.4);
            color: var(--danger-color);
        }

        .warnings-log {
            margin-top: 15px;
            max-height: 250px;
            overflow-y: auto;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
        }

        .warning-item {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--warning-text);
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #21262d;
        }

        .warning-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .warning-header {
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lidl JSON naar CSV Converter</h1>
        <p>Sleep je JSON-bestand in het vak of plak de ruwe JSON-data direct in het invoerveld hieronder.</p>
        
        <div id="dropzone" class="dropzone">
            Drop je JSON-bestand hier of klik om te uploaden
            <input type="file" id="fileInput" accept=".json" style="display: none;">
        </div>

        <textarea id="jsonInput" placeholder="Plak hier je [ { ... } ] JSON data..."></textarea>
        
        <div class="info-bar">
            <span>De data wordt direct lokaal in je browser verwerkt.</span>
            <span id="productCount" class="counter-badge">0 producten</span>
        </div>

        <div class="action-buttons">
            <button id="btnClear" class="btn-secondary" onclick="clearAll()">Lijst Leegmaken</button>
            <button id="btnConvert" class="btn-primary" onclick="convertJson()">Converteer & Download</button>
        </div>

        <div id="reportBox" class="report-box">
            <div id="reportStatus" style="font-weight: 600;"></div>
            <div id="warningsLog" class="warnings-log" style="display: none;"></div>
        </div>
    </div>

    <script>
        // Exacte CMS configuratie uit het Python-script
        const COLUMNS = [
            "language", "title", "long title", "product group id", "sub title",
            "price", "discount title", "price prefix id", "old price", "base price",
            "quantity text", "highlight theme", "highlight text", "negate colors",
            "price legend id", "article legend id", "1st ribbon type", "2nd ribbon type",
            "3rd ribbon type", "ribbon image id", "online from", "online until",
            "valid from", "valid until", "textile sizes", "textile person type id",
            "textile clothing type id", "description", "second description", "meta title",
            "meta description", "meta filename", "item number", "ian", "nan",
            "logo image ids", "region ids", "shop article id", "brand",
            "lidl plus price", "lidl plus base price", "lidl plus highlight text",
            "lidl plus price prefix id", "lidl plus stores", "lidl plus region ids",
            "age restriction"
        ];

        const ALWAYS_EMPTY = new Set([
            "textile sizes", "textile person type id", "textile clothing type id",
            "second description", "meta title", "meta description",
            "meta filename", "region ids", "shop article id", "lidl plus stores",
            "lidl plus region ids", "age restriction"
        ]);

        const NEVER_EMPTY = new Set([
            "language", "title", "long title", "product group id",
            "online from", "online until", "valid from", "valid until",
            "item number", "ian", "nan"
        ]);

        const KNOWN_FAKE_BRANDS = new Set(["ludwig", "action", "bonus", "aanbieding"]);

        // UI Koppelingen
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const jsonInput = document.getElementById('jsonInput');
        const productCount = document.getElementById('productCount');
        const reportBox = document.getElementById('reportBox');
        const reportStatus = document.getElementById('reportStatus');
        const warningsLog = document.getElementById('warningsLog');

        // Drag & Drop events
        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.borderColor = "var(--accent-color)"; });
        dropzone.addEventListener('dragleave', () => { dropzone.style.borderColor = "var(--border-color)"; });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.style.borderColor = "var(--border-color)";
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        // Automatische teller bij handmatige invoer
        jsonInput.addEventListener('input', updateCount);

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                jsonInput.value = e.target.result;
                updateCount();
            };
            reader.readAsText(file);
        }

        function updateCount() {
            try {
                let content = jsonInput.value.trim().replace(/^```json\s*/i, '').replace(/\s*```$/, '');
                if (!content) {
                    productCount.textContent = "0 producten";
                    return;
                }
                let parsed = JSON.parse(content);
                let len = Array.isArray(parsed) ? parsed.length : 1;
                productCount.textContent = `${len} product${len === 1 ? '' : 'en'}`;
            } catch (e) {
                productCount.textContent = "Ongeldige JSON";
            }
        }

        function cleanValue(value) {
            if (value === undefined || value === null) return "";
            return String(value).replace(/[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/g, '').trim();
        }

        function validateRow(product, rowValues, rowIndex) {
            let rowWarnings = [];
            
            NEVER_EMPTY.forEach(col => {
                let idx = COLUMNS.indexOf(col);
                if (idx !== -1 && !rowValues[idx]) {
                    rowWarnings.push(`⚠️ '${col}' is leeg maar mag dat niet zijn`);
                }
            });

            ALWAYS_EMPTY.forEach(col => {
                let idx = COLUMNS.indexOf(col);
                if (idx !== -1 && rowValues[idx]) {
                    rowWarnings.push(`⚠️ '${col}' heeft een waarde maar moet leeg zijn: '${rowValues[idx]}'`);
                }
            });

            let priceIdx = COLUMNS.indexOf("price");
            let lidlPriceIdx = COLUMNS.indexOf("lidl plus price");
            if (rowValues[lidlPriceIdx] && rowValues[priceIdx]) {
                rowWarnings.push(`⚠️ Heeft zowel 'price' als 'lidl plus price' — bij Lidl Plus moet 'price' leeg zijn`);
            }

            let brandIdx = COLUMNS.indexOf("brand");
            let brandVal = rowValues[brandIdx];
            if (brandVal && KNOWN_FAKE_BRANDS.has(brandVal.toLowerCase())) {
                rowWarnings.push(`⚠️ 'brand' bevat waarschijnlijk een foutieve waarde: '${brandVal}'`);
            }

            return rowWarnings;
        }

        function convertJson() {
            let rawContent = jsonInput.value.trim();
            if (!rawContent) {
                showReport("Fout: Geen data ingevoerd.", true);
                return;
            }

            rawContent = rawContent.replace(/^```json\s*/i, '').replace(/\s*```$/, '');

            let data;
            try {
                data = JSON.parse(rawContent);
            } catch (e) {
                showReport(`❌ JSON Parse Fout: ${e.message}`, true);
                return;
            }

            if (!Array.isArray(data)) data = [data];

            let rows = [];
            let allWarningsHtml = [];
            let totalWarnings = 0;

            data.forEach((product, i) => {
                let basePrice = product["base price"] || "";
                let description = product["description"] || "";
                
                const gekochtRegex = /Product gekocht op .+? (online|supermarkt)[^.]*.?/g;
                let match = basePrice.match(gekochtRegex);
                
                if (match) {
                    let gekochtZin = match[0].trim();
                    if (!description) {
                        product["description"] = gekochtZin;
                    }
                    basePrice = basePrice.replace(gekochtZin, "").trim();
                    if (basePrice.endsWith('.')) basePrice = basePrice.slice(0, -1).trim();
                    product["base price"] = basePrice;
                }

                let baseClean = basePrice.replace(",", ".").trim();
                if (baseClean !== "" && !isNaN(baseClean)) {
                    if (!product["old price"]) {
                        product["old price"] = basePrice;
                    }
                    product["base price"] = "";
                }

                let rowValues = [];
                COLUMNS.forEach(col => {
                    rowValues.push(cleanValue(product[col]));
                });

                let warnings = validateRow(product, rowValues, i);
                if (warnings.length > 0) {
                    totalWarnings += warnings.length;
                    let title = product.title || `Product ${i + 1}`;
                    let block = `<div class="warning-item"><div class="warning-header">📦 ${title} (Rij ${i + 1}):</div>`;
                    warnings.forEach(w => block += `<div>${w}</div>`);
                    block += `</div>`;
                    allWarningsHtml.push(block);
                }

                rows.push(rowValues.join(";"));
            });

            let csvContent = COLUMNS.join(";") + "\n" + rows.join("\n");
            
            // Excel-friendly UTF-8 download via BOM
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "output.csv";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // Toon eindrapportage
            if (totalWarnings > 0) {
                showReport(`✅ ${data.length} producten verwerkt en gedownload. Er zijn ${totalWarnings} waarschuwingen gevonden.`, false);
                warningsLog.innerHTML = allWarningsHtml.join("");
                warningsLog.style.display = "block";
            } else {
                showReport(`✅ ${data.length} producten succesvol verwerkt! Geen waarschuwingen gevonden.`, false);
                warningsLog.style.display = "none";
            }
        }

        function showReport(text, isError) {
            reportBox.className = `report-box ${isError ? 'report-error' : 'report-success'}`;
            reportStatus.textContent = text;
            reportBox.style.display = "block";
            if(isError) warningsLog.style.display = "none";
        }

        function clearAll() {
            jsonInput.value = "";
            reportBox.style.display = "none";
            warningsLog.style.display = "none";
            updateCount();
        }
    </script>
</body>
</html>
