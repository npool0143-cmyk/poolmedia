<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidl Flyer Versie Bouwer v1</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="icon" type="image/png" href="https://www.lidl.nl/static/assets/1f8d040c-8532-4af5-9c99-7a59545365de.svg" />
    <style>
        @font-face {
            font-family: 'Lidl Font Pro';
            src: url('fonts/LidlFontPro-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        
        @font-face {
            font-family: 'Lidl Font Pro';
            src: url('fonts/LidlFontPro-Bold.woff') format('woff');
            font-weight: bold;
            font-style: normal;
        }
        
        @font-face {
            font-family: 'Lidl Font Pro';
            src: url('fonts/LidlFontPro-Semibold.woff') format('woff');
            font-weight: 600;
            font-style: normal;
        }
        
        @font-face {
            font-family: 'Lidl Font Pro';
            src: url('fonts/LidlFontPro-Book.woff') format('woff');
            font-weight: 300;
            font-style: normal;
        }

        /* 2. Lidl Huisstijl & Interface Layout */
        body { 
            margin: 0;
            padding: 40px 20px;
            background-color: #002466; 
            color: #000;
            font-family: 'Lidl Font Pro', 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        html, input, select, button {
            font-family: 'Lidl Font Pro', 'Segoe UI', Arial, sans-serif;
        }

        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); 
            max-width: 500px; 
            width: 100%; 
            border-top: 8px solid #0050aa; 
            position: relative;
        }

        .logo-header {
            text-align: center;
            margin-bottom: 20px;
            fill: #0050aa;
        }

        h1 { 
            color: #0050aa; 
            text-align: center; 
            margin-top: 0; 
            font-size: 28px; 
            font-weight: bold;
        }

        p.subtitle { 
            text-align: center; 
            color: #666; 
            font-size: 14px; 
            margin-bottom: 30px; 
        }

        .form-group { 
            margin-bottom: 25px; 
        }

        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #333; 
            font-size: 15px;
        }

        input[type="number"], input[type="file"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #0050aa; 
            border-radius: 50px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: #fff;
            color: #333;
            padding-left: 20px;
        }

        input[type="file"] {
            padding: 10px;
            padding-left: 15px;
            font-size: 14px;
        }

        button { 
            width: 100%; 
            background-color: #0050aa; 
            color: white; 
            border: none; 
            padding: 14px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        button:hover { 
            color: #000;
            background-color: #fff200; 
        }

        button:disabled { 
            background-color: #cccccc; 
            color: #666;
            cursor: not-allowed; 
            box-shadow: none;
        }

        #status { 
            display: none; 
            text-align: center; 
            margin-top: 25px; 
            font-weight: bold; 
            color: white; 
            padding: 15px; 
            border-radius: 8px; 
            background-color: #0050aa;
            font-size: 15px;
        }

        #status.error { 
            background-color: #d9534f; 
            border: 1px solid #b52b27;
        }

        #status.error .spinner-container { 
            display: none; 
        }

        .spinner-container {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        .pure-loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 80, 170, 0.1); /* Lichtblauw vangnet */
            border-left-color: #0050aa; /* Lidl Blauw */
            border-right-color: #fff200; /* Lidl Geel */
            border-radius: 50%;
            animation: pure-spin 1s linear infinite;
        }

        @keyframes pure-spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        .footer { 
            margin-top: 40px; 
            text-align: center; 
            font-size: 11px; 
            color: #999; 
            border-top: 1px solid #eee;
            padding-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-header">
        <img src="assets/Lidl_icon_print flyer_rgb.svg" height="85" alt="Lidl Logo">
    </div>

    <h1>Flyer Splitter & Opschoner</h1>
    <p class="subtitle">Versie 1, Laatst geüpdatet: 1 juli 2026</p>
    
    <div class="form-group">
        <label for="week_nr">🔢 Weeknummer:</label>
        <input type="number" id="week_nr" placeholder="Bijv. 22" min="1" max="53">
    </div>
    
    <div class="form-group">
        <label for="pdf_file">📄 Selecteer je gelinkte basis PDF:</label>
        <input type="file" id="pdf_file" accept=".pdf">
    </div>
    
    <button id="start_btn" onclick="verwerkPdf()">Start Verwerking & Download ZIP</button>

    <div id="status">
        <div class="spinner-container" id="status_spinner">
            <div class="pure-loading-spinner"></div>
        </div>
        <div id="status_text" style="white-space: pre-line; text-align: left; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 13px; padding: 5px;">PDF initialiseren...</div>
    </div>

    <div class="footer">
        <img src="https://www.lidl.nl/static/assets/1f8d040c-8532-4af5-9c99-7a59545365de.svg" height="25" alt="Lidl"> Automatisering Tooling &copy; 2026
    </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const JAAR = "2026";
const GROEPEN = ["G1G2", "G3G4", "G5G6", "LANDELIJK"];

const NF_TREFWOORDEN = [
    "ALTIJD MEER OP LIDL.NL", "PARKSIDE", "SILVERCREST", "ESMARA", "LIVERGY", "CRIVIT", "ZOOFARI", 
    "LUPILU", "ULTIMATE SPEED", "GARDENA", "ZOMEROPRUIMING", "WINTEROPRUIMING", "OPRUIMING", "ERNESTO", 
    "MERADISO", "LIVARNO", "LIVARNO HOME", "LIVARNO LUX", "AQUAPUR", "MIOMARE", "PEPPERTS", 
    "PLAYTIVE", "AUNTSFIELD", "NEVADENT", "SANITAS", "VITALCONTROL", "TRONIC", "TOPMOVE", 
    "CRELANDO", "ROCKTRAIL", "SENSIPLAST", "WITTENBERG", "PARKSIDE PERFORMANCE", "PHILIPS", "MEXX", "BOSCH"
];
const FOOD_UITZONDERINGEN = ["WERKENBIJLIDL", "WERKEN BIJ", "TEAMLIDL", "#TEAMLIDL"];
const WEEKEND_UITZONDERINGEN = ["POTMAAT", "PLANT", "PLANTEN", "BLOEMEN", "BOEKET", "LEPELPLANT", "SUNFLOWERS", "ZONNEBLOEMEN"];

async function verwerkPdf() {
    const weekNrInput = document.getElementById('week_nr').value.trim();
    const fileInput = document.getElementById('pdf_file').files[0];
    const statusDiv = document.getElementById('status');
    const statusText = document.getElementById('status_text');
    const statusSpinner = document.getElementById('status_spinner');
    const startBtn = document.getElementById('start_btn');

    if (!weekNrInput || !fileInput) {
        toonFout("❌ Vul een weeknummer in en selecteer een PDF-bestand.");
        return;
    }

    statusDiv.className = '';
    statusSpinner.style.display = 'block';
    statusDiv.style.display = 'block';
    startBtn.disabled = true;

    try {
        statusText.innerText = "🔍 PDF analyseren op regio's, Non-Food en Weekend Food pagina's...";
        const fileBytes = await fileInput.arrayBuffer();
        const fileBytesCopy = fileBytes.slice(0); 

        const loadingTask = pdfjsLib.getDocument({ data: fileBytesCopy });
        const pdfTextDoc = await loadingTask.promise;
        const totaalPaginas = pdfTextDoc.numPages;
        const laatstePaginaIndex = totaalPaginas - 1;

        const pdfEditDoc = await PDFLib.PDFDocument.load(fileBytes);

        let allePaginasPerGroep = { "G1G2": [], "G3G4": [], "G5G6": [], "LANDELIJK": [] };
        let nfPaginasPerGroep = { "G1G2": [], "G3G4": [], "G5G6": [], "LANDELIJK": [] };
        let landelijkeWeekendPaginas = [];
        
        // Bewaar alle weblinks en coördinaten via de PDF.js-laag voor latere heropbouw
        let schoneLinksPerPagina = {};

        for (let i = 0; i < totaalPaginas; i++) {
            const pageTextObj = await pdfTextDoc.getPage(i + 1);
            const textContent = await pageTextObj.getTextContent();
            let text = textContent.items.map(item => item.str).join(" ").toUpperCase();
            
            const annotations = await pageTextObj.getAnnotations();
            let hasProductLink = false;
            let hasLidlNlLink = false;
            
            schoneLinksPerPagina[i] = [];

            for (let annot of annotations) {
                if (annot.subtype === 'Link' && annot.url) {
                    const urlStr = annot.url;
                    const urlLower = urlStr.toLowerCase();
                    
                    if (urlLower.includes('lidl.nl')) hasLidlNlLink = true;
                    if ((urlLower.includes('/p/') || urlLower.includes('/q/')) && !urlLower.includes('lidlplus')) hasProductLink = true;
                    
                    // Schone URL bepaling voor de overschrijf-layer
                    let schoneUrl = urlStr;
                    if (urlLower.includes('utm_')) {
                        const indexVraagteken = urlStr.indexOf('?');
                        const indexAmpersand = urlStr.indexOf('&');
                        let knipPositie = (indexVraagteken !== -1 && indexAmpersand !== -1) 
                            ? Math.min(indexVraagteken, indexAmpersand) 
                            : (indexVraagteken !== -1 ? indexVraagteken : indexAmpersand);
                        
                        if (knipPositie !== -1) {
                            schoneUrl = urlStr.substring(0, knipPositie);
                        }
                    }
                    
                    schoneLinksPerPagina[i].push({
                        url: schoneUrl,
                        rect: annot.rect
                    });
                }
            }

            // STAP A: IDENTIFICEER PAGINA-EIGENSCHAPPEN (Exact conform je Python script)
            let isNonFood = false;
            if (i !== 0) {
                if (NF_TREFWOORDEN.some(term => text.includes(term)) || hasProductLink || hasLidlNlLink) {
                    isNonFood = true;
                }
                if (FOOD_UITZONDERINGEN.some(u => text.includes(u))) {
                    isNonFood = false;
                }
            }

            if (i === laatstePaginaIndex) {
                landelijkeWeekendPaginas.push(i);
            } else if (text.includes("VANAF VRIJDAG") && !hasProductLink) {
                if (!WEEKEND_UITZONDERINGEN.some(u => text.includes(u))) {
                    landelijkeWeekendPaginas.push(i);
                }
            }

            // STAP B: VERDEEL DE PAGES OP REGIO
            let behoortTotGroepen = [];
            if (text.includes("G1/G2/G3/G4/G5/G6")) {
                behoortTotGroepen = GROEPEN;
            } else if (text.includes("LANDELIJK") && !text.includes("LANDELIJKE")) {
                behoortTotGroepen = ["LANDELIJK"];
            } else if (!([1, 2, 3, 4, 5, 6].some(n => text.includes(`G${n}`)))) {
                behoortTotGroepen = GROEPEN;
            } else {
                for (let n = 1; n <= 6; n++) {
                    if (text.includes(`G${n}`)) {
                        GROEPEN.forEach(groep => {
                            if (groep.includes(`G${n}`) && !behoortTotGroepen.includes(groep)) {
                                behoortTotGroepen.push(groep);
                            }
                        });
                    }
                }
            }

            behoortTotGroepen.forEach(groep => {
                allePaginasPerGroep[groep].push(i);
                if (isNonFood || i === 1) {
                    nfPaginasPerGroep[groep].push(i);
                }
            });
        }

        const zip = new JSZip();

        async function voegPdfToeAanZip(regioNaam, paginas, typeFolder) {
            if (!paginas || paginas.length === 0) return;

            let actuelePaginas = [...paginas];
            if (typeFolder === "FOOD") {
                actuelePaginas = actuelePaginas.filter(p => p !== 1 && p !== laatstePaginaIndex);
            } else if (typeFolder === "WEEKEND") {
                let anderePaginas = actuelePaginas.filter(p => p !== laatstePaginaIndex);
                actuelePaginas = actuelePaginas.includes(laatstePaginaIndex) ? [laatstePaginaIndex, ...anderePaginas] : anderePaginas;
            }

            if (actuelePaginas.length === 0) return;

            statusText.innerText += `\n⚙️${typeFolder} folder voor ${regioNaam} genereren (${actuelePaginas.length} pagina's)...`;
            statusText.scrollTop = statusText.scrollHeight;

            let bestandsnaam = (typeFolder === "NONFOOD" || typeFolder === "WEEKEND") 
                ? `WK${weekNrInput}_${typeFolder}_${regioNaam}_${JAAR}`
                : `WK${weekNrInput}_${regioNaam}_${JAAR}`;

            // Bouw EXTERN direct schoon op (zonder link manipulatie)
            const subDocExtern = await PDFLib.PDFDocument.create();
            const gekopieerdePaginasExtern = await subDocExtern.copyPages(pdfEditDoc, actuelePaginas);
            gekopieerdePaginasExtern.forEach(p => subDocExtern.addPage(p));
            
            if (typeFolder === "WEEKEND") {
                await overschrijfEnHerbouwLinks(subDocExtern, actuelePaginas);
                const weekendBytes = await subDocExtern.save();
                zip.file(`LIDL/WEEKEND/${bestandsnaam}_LIDL.pdf`, weekendBytes);
                return;
            }

            const externBytes = await subDocExtern.save();
            zip.file(`EXTERN/${typeFolder}/${bestandsnaam}_EXTERN.pdf`, externBytes);

            // Bouw LIDL op basis van de schone EXTERN en overschrijf daar de annotatie layers
            const subDocLidl = await PDFLib.PDFDocument.load(externBytes);
            await overschrijfEnHerbouwLinks(subDocLidl, actuelePaginas);
            const lidlBytes = await subDocLidl.save();
            zip.file(`LIDL/${typeFolder}/${bestandsnaam}_LIDL.pdf`, lidlBytes);
        }

        // De onfeilbare array layer overschrijver op basis van PDF coördinaten
        async function overschrijfEnHerbouwLinks(doc, originelePaginas) {
            const pages = doc.getPages();
            
            for (let index = 0; index < pages.length; index++) {
                const editPage = pages[index];
                const originelePaginaIndex = originelePaginas[index];
                const linksOmTeSchoonmaken = schoneLinksPerPagina[originelePaginaIndex];

                if (linksOmTeSchoonmaken && linksOmTeSchoonmaken.length > 0) {
                    
                    // Maak een splinternieuwe lege PDFArray aan binnen de context van dit document
                    const nieuweAnnotsArray = doc.context.obj([]);
                    editPage.node.set(PDFLib.PDFName.of('Annots'), nieuweAnnotsArray);

                    for (let schoneLink of linksOmTeSchoonmaken) {
                        const r = schoneLink.rect;
                        
                        const nieuweLinkAnnotatie = doc.context.obj({
                            Type: 'Annot',
                            Subtype: 'Link',
                            Rect: [r[0], r[1], r[2], r[3]], 
                            Border: [0, 0, 0],              
                            A: {
                                Type: 'Action',
                                S: 'URI',
                                URI: PDFLib.PDFString.of(schoneLink.url) 
                            }
                        });

                        nieuweAnnotsArray.push(nieuweLinkAnnotatie);
                    }
                }
            }
        }

        for (const naam of GROEPEN) {
            await voegPdfToeAanZip(naam, allePaginasPerGroep[naam], "FOOD");
            await voegPdfToeAanZip(naam, nfPaginasPerGroep[naam], "NONFOOD");
        }
        await voegPdfToeAanZip("LANDELIJK", landelijkeWeekendPaginas, "WEEKEND");

        statusText.innerText += "\n📦 ZIP-pakket downloaden...";
        const zipContent = await zip.generateAsync({ type: "blob" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(zipContent);
        link.download = `Flyer_Week_${weekNrInput}.zip`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        statusText.innerText += `\n🎉 HELEMAAL KLAAR! Alles staat nu 100% correct gesorteerd in je 'Flyer_Week_${weekNrInput}' map!`;
        setTimeout(() => { statusDiv.style.display = 'none'; startBtn.disabled = false; }, 3000);

    } catch (error) {
        console.error(error);
        toonFout("❌ Er ging iets fout bij het verwerken. Open de console (F12) voor meer details.");
        startBtn.disabled = false;
    }
}

function toonFout(bericht) {
    const statusDiv = document.getElementById('status');
    const statusText = document.getElementById('status_text');
    statusDiv.className = 'error';
    statusText.innerText = bericht;
    statusDiv.style.display = 'block';
}
</script>
</body>
</html>
