<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidl Flyer Versie Bouwer</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --lidl-blue: #002f6c;
            --lidl-yellow: #fff200;
            --lidl-red: #df1625;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            border-top: 8px solid var(--lidl-blue);
        }
        h1 {
            color: var(--lidl-blue);
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        input[type="number"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input[type="file"] {
            background: #fafafa;
            cursor: pointer;
        }
        button {
            width: 100%;
            background-color: var(--lidl-blue);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #001f4d;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 11px;
            color: #999;
        }
        #status {
            display: none;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            color: var(--lidl-blue);
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--lidl-blue);
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Lidl Flyer Splitter & Opschoner</h1>
    <p class="subtitle">Volledig lokale verwerking in de browser (geen server nodig).</p>
    
    <div class="form-group">
        <label for="week_nr">🔢 Weeknummer:</label>
        <input type="number" id="week_nr" placeholder="Bijv. 22" min="1" max="53">
    </div>
    
    <div class="form-group">
        <label for="pdf_file">📄 Selecteer 'basis_gelinkt.pdf':</label>
        <input type="file" id="pdf_file" accept=".pdf">
    </div>
    
    <button id="start_btn" onclick="verwerkPdf()">Start Verwerking & Download ZIP</button>

    <div id="status">
        <div class="spinner"></div>
        <span id="status_text">PDF analyseren...</span>
    </div>

    <div class="footer">
        Automatisering Tooling &copy; 2026
    </div>
</div>

<script>
const JAAR = "2026";
const GROEPEN = ["G1G2", "G3G4", "G5G6", "LANDELIJK"];

const NF_TREFWOORDEN = [
    "ALTIJD MEER OP LIDL.NL", "PARKSIDE", "SILVERCREST", "ESMARA", "LIVERGY", "CRIVIT", 
    "ZOOFARI", "LUPILU", "ULTIMATE SPEED", "GARDENA", "ZOMEROPRUIMING", "WINTEROPRUIMING", 
    "OPRUIMING", "ERNESTO", "MERADISO", "LIVARNO", "LIVARNO HOME", "LIVARNO LUX", 
    "AQUAPUR", "MIOMARE", "PEPPERTS", "PLAYTIVE", "AUNTSFIELD", "NEVADENT", "SANITAS", 
    "VITALCONTROL", "TRONIC", "TOPMOVE", "CRELANDO", "ROCKTRAIL", "SENSIPLAST", 
    "WITTENBERG", "PARKSIDE PERFORMANCE"
];

const FOOD_UITZONDERINGEN = ["WERKENBIJLIDL", "WERKEN BIJ", "TEAMLIDL", "#TEAMLIDL"];
const WEEKEND_UITZONDERINGEN = ["POTMAAT", "PLANT", "PLANTEN", "BLOEMEN", "BOEKET", "LEPELPLANT", "SUNFLOWERS", "ZONNEBLOEMEN"];

async function verwerkPdf() {
    const weekNrInput = document.getElementById('week_nr').value.trim();
    const fileInput = document.getElementById('pdf_file').files[0];
    const statusDiv = document.getElementById('status');
    const statusText = document.getElementById('status_text');
    const startBtn = document.getElementById('start_btn');

    if (!weekNrInput || !fileInput) {
        alert("❌ Vul een weeknummer in en selecteer een PDF-bestand.");
        return;
    }

    // UI klaarmaken voor laden
    statusDiv.style.display = 'block';
    startBtn.disabled = true;

    try {
        statusText.innerText = "PDF inlezen...";
        const fileBytes = await fileInput.arrayBuffer();
        
        // Laad het document twee keer (één voor PDF-Lib bewerkingen, één om tekst te scannen)
        // PDF-Lib heeft beperkte tekstextractie, dus we scannen de links/annotaties om data te vinden
        const pdfDoc = await PDFLib.PDFDocument.load(fileBytes);
        const totaalPaginas = pdfDoc.getPageCount();
        const laatstePaginaIndex = totaalPaginas - 1;

        // Lijsten voor pagina-indeling
        let allePaginasPerGroep = { "G1G2": [], "G3G4": [], "G5G6": [], "LANDELIJK": [] };
        let nfPaginasPerGroep = { "G1G2": [], "G3G4": [], "G5G6": [], "LANDELIJK": [] };
        let landelijkeWeekendPaginas = [];

        statusText.innerText = "Pagina's analyseren op content...";

        // --- STAP A & B: ANALYSE ---
        // Opmerking: Omdat pure JS in de browser zonder zware text-extractors werkt, 
        // scannen we de URI links en metadata van de pagina's om te bepalen wat Food/NF/Regio is.
        for (let i = 0; i < totaalPaginas; i++) {
            const page = pdfDoc.getPage(i);
            
            // Haal links op uit de pagina annotaties om productlinks te detecteren
            let hasProductLink = false;
            let pageTextMock = ""; // Fallback text uit de links/titels
            
            // We proberen zoveel mogelijk tekstkenmerken te achterhalen uit de PDF annotatiestructuur
            if (page.node && page.node.Annots) {
                const annots = pdfDoc.context.lookup(page.node.Annots);
                if (annots && annots.array) {
                    for (const annotRef of annots.array) {
                        const annot = pdfDoc.context.lookup(annotRef);
                        if (annot && annot.get) {
                            const a = annot.get(PDFLib.PDFName.of('A'));
                            if (a) {
                                const uri = a.get(PDFLib.PDFName.of('URI'));
                                if (uri) {
                                    const urlStr = uri.value.toLowerCase();
                                    pageTextMock += " " + urlStr.toUpperCase();
                                    if ((urlStr.includes('/p/') || urlStr.includes('/q/')) && !urlStr.includes('lidlplus')) {
                                        hasProductLink = true;
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // Aangezien JavaScript in de browser niet standaard gratis betrouwbare OCR/text extraction heeft zoals PyMuPDF,
            // vallen we voor regioherkenning en trefwoorden primair terug op wat we in de URI's en paginastructuur vinden.
            // TIP: Mocht de tekstextractie cruciaal zijn voor de trefwoorden (zoals "PARKSIDE"), dan scant deze browserversie 
            // de URL's waarin deze merken ook vaak voorkomen bij Lidl folders.
            
            let isNonFood = false;
            if (i !== 0) {
                if (NF_TREFWOORDEN.some(term => pageTextMock.includes(term)) || hasProductLink) {
                    isNonFood = true;
                }
                if (FOOD_UITZONDERINGEN.some(u => pageTextMock.includes(u))) {
                    isNonFood = false;
                }
            }

            if (i === laatstePaginaIndex) {
                landelijkeWeekendPaginas.push(i);
            } else if (pageTextMock.includes("VANAF-VRIJDAG") || (i > laatstePaginaIndex - 4 && !hasProductLink)) { 
                // Schatting weekend op basis van positie achterin en link-eigenschappen als vangnet
                if (!WEEKEND_UITZONDERINGEN.some(u => pageTextMock.includes(u))) {
                    landelijkeWeekendPaginas.push(i);
                }
            }

            // Regio bepaling (Standaard alles toewijzen als er geen specifieke indicatie is)
            let behoortTotGroepen = GROEPEN;
            if (pageTextMock.includes("LANDELIJK")) {
                behoortTotGroepen = ["LANDELIJK"];
            } else {
                for (let n = 1; n <= 6; n++) {
                    if (pageTextMock.includes(`G${n}`)) {
                        behoortTotGroepen = GROEPEN.filter(g => g.includes(`G${n}`));
                    }
                }
            }

            behoortTotGroepen.forEach(groep => {
                allePaginasPerGroep[groep].push(i);
                if (isNonFood || i === 1) {
                    nfPaginasPerGroep[groep].push(i);
                }
            });
        }

        // --- STAP C: BESTANDEN BOUWEN IN ZIP ---
        statusText.innerText = "Nieuwe PDF versies genereren...";
        const zip = new JSZip();

        async function voegPdfToeAanZip(regioNaam, paginas, typeFolder) {
            if (!paginas || paginas.length === 0) return;

            let actuelePaginas = [...paginas];
            if (typeFolder === "FOOD") {
                actuelePaginas = actuelePaginas.filter(p => p !== 1 && p !== laatstePaginaIndex);
            } else if (typeFolder === "WEEKEND") {
                let anderePaginas = actuelePaginas.filter(p => p !== laatstePaginaIndex);
                actuelePaginas = actuelePaginas.includes(laatstePaginaIndex) ? [laatstePaginaIndex, ...anderePaginas] : anderePaginas;
            }

            if (actuelePaginas.length === 0) return;

            let bestandsnaam = (typeFolder === "NONFOOD" || typeFolder === "WEEKEND") 
                ? `WK${weekNrInput}_${typeFolder}_${regioNaam}_${JAAR}`
                : `WK${weekNrInput}_${regioNaam}_${JAAR}`;

            // Maak EXTERN PDF document aan
            const subDocExtern = await PDFLib.PDFDocument.create();
            const gekopieerdePaginasExtern = await subDocExtern.copyPages(pdfDoc, actuelePaginas);
            gekopieerdePaginasExtern.forEach(p => subDocExtern.addPage(p));
            
            if (typeFolder === "WEEKEND") {
                // Weekend heeft alleen LIDL (en wordt direct opgeschoond)
                await schoonLinksOp(subDocExtern);
                const weekendBytes = await subDocExtern.save();
                zip.file(`LIDL/WEEKEND/${bestandsnaam}_LIDL.pdf`, weekendBytes);
                return;
            }

            // Sla EXTERN op in de zip
            const externBytes = await subDocExtern.save();
            zip.file(`EXTERN/${typeFolder}/${bestandsnaam}_EXTERN.pdf`, externBytes);

            // Maak LIDL variant (kopie van de subDoc en dan opschonen)
            const subDocLidl = await PDFLib.PDFDocument.load(externBytes);
            await schoonLinksOp(subDocLidl);
            const lidlBytes = await subDocLidl.save();
            zip.file(`LIDL/${typeFolder}/${bestandsnaam}_LIDL.pdf`, lidlBytes);
        }

        // Helper functie om UTM tags te slopen uit de links in PDF-Lib
        async function schoonLinksOp(doc) {
            const pages = doc.getPages();
            for (const page of pages) {
                if (page.node && page.node.Annots) {
                    const annots = doc.context.lookup(page.node.Annots);
                    if (annots && annots.array) {
                        for (const annotRef of annots.array) {
                            const annot = doc.context.lookup(annotRef);
                            if (annot && annot.get) {
                                const a = annot.get(PDFLib.PDFName.of('A'));
                                if (a) {
                                    const uri = a.get(PDFLib.PDFName.of('URI'));
                                    if (uri) {
                                        let urlStr = uri.value;
                                        if (urlStr.includes("utm_medium")) {
                                            // Splits de URL op om de UTM rommel te verwijderen
                                            let schoneUrl = urlStr.split("?utm_medium")[0].split("&utm_medium")[0];
                                            a.set(PDFLib.PDFName.of('URI'), PDFLib.PDFString.of(schoneUrl));
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        // Loop door alle groepen heen en bouw de PDF's op
        for (const naam of GROEPEN) {
            await voegPdfToeAanZip(naam, allePaginasPerGroep[naam], "FOOD");
            await voegPdfToeAanZip(naam, nfPaginasPerGroep[naam], "NONFOOD");
        }
        await voegPdfToeAanZip("LANDELIJK", landelijkeWeekendPaginas, "WEEKEND");

        // ZIP genereren en download starten
        statusText.innerText = "ZIP-archief samenstellen...";
        const zipContent = await zip.generateAsync({ type: "blob" });
        
        const link = document.createElement('a');
        link.href = URL.createObjectURL(zipContent);
        link.download = `Flyer_Week_${weekNrInput}.zip`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        statusText.innerText = "Gereed!";
        setTimeout(() => { statusDiv.style.display = 'none'; startBtn.disabled = false; }, 2000);

    } catch (error) {
        console.error(error);
        alert("❌ Er is een fout opgetreden bij het verwerken van de PDF. Bekijk de console voor details.");
        statusDiv.style.display = 'none';
        startBtn.disabled = false;
    }
}
</script>
</body>
</html>
