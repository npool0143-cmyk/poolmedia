<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidl Flyer Versie Bouwer v1.0</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        :root { --lidl-blue: #002f6c; --lidl-yellow: #fff200; --error-red: #d9534f; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); max-width: 500px; width: 100%; border-top: 8px solid var(--lidl-blue); }
        h1 { color: var(--lidl-blue); text-align: center; margin-top: 0; font-size: 24px; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input[type="number"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: var(--lidl-blue); color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background-color: #001f4d; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #status { display: none; text-align: center; margin-top: 20px; font-weight: bold; color: var(--lidl-blue); padding: 10px; border-radius: 6px; }
        #status.error { color: var(--error-red); background-color: #fdf2f2; border: 1px solid var(--error-red); }
        #status.error .spinner { display: none; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--lidl-blue); animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { margin-top: 30px; text-align: center; font-size: 11px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lidl Flyer Splitter</h1>
    <p class="subtitle">Gecorrigeerde v3.1: Volledige trefwoordenlijst & in-browser verwerking.</p>
    
    <div class="form-group">
        <label for="week_nr">🔢 Weeknummer:</label>
        <input type="number" id="week_nr" placeholder="Bijv. 22" min="1" max="53">
    </div>
    
    <div class="form-group">
        <label for="pdf_file">📄 Selecteer 'basis_gelinkt.pdf':</label>
        <input type="file" id="pdf_file" accept=".pdf">
    </div>
    
    <button id="start_btn" onclick="verwerkPdf()">Start Verwerking & Download ZIP</button>

    <div id="status">
        <div class="spinner" id="status_spinner"></div>
        <span id="status_text">PDF initialiseren...</span>
    </div>

    <div class="footer">
        Automatisering Tooling &copy; 2026
    </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const JAAR = "2026";
const GROEPEN = ["G1G2", "G3G4", "G5G6", "LANDELIJK"];

// Volledige lijst hersteld uit je originele script
const NF_TREFWOORDEN = [
    "ALTIJD MEER OP LIDL.NL", "PARKSIDE", "SILVERCREST", "ESMARA", "LIVERGY", "CRIVIT", "ZOOFARI", 
    "LUPILU", "ULTIMATE SPEED", "GARDENA", "ZOMEROPRUIMING", "WINTEROPRUIMING", "OPRUIMING", "ERNESTO", 
    "MERADISO", "LIVARNO", "LIVARNO HOME", "LIVARNO LUX", "AQUAPUR", "MIOMARE", "PEPPERTS", 
    "PLAYTIVE", "AUNTSFIELD", "NEVADENT", "SANITAS", "VITALCONTROL", "TRONIC", "TOPMOVE", 
    "CRELANDO", "ROCKTRAIL", "SENSIPLAST", "WITTENBERG", "PARKSIDE PERFORMANCE", "PHILIPS", "MEXX", "BOSCH"
];
const FOOD_UITZONDERINGEN = ["WERKENBIJLIDL", "WERKEN BIJ", "TEAMLIDL", "#TEAMLIDL"];
const WEEKEND_UITZONDERINGEN = ["POTMAAT", "PLANT", "PLANTEN", "BLOEMEN", "BOEKET", "LEPELPLANT", "SUNFLOWERS", "ZONNEBLOEMEN"];

async function verwerkPdf() {
    const weekNrInput = document.getElementById('week_nr').value.trim();
    const fileInput = document.getElementById('pdf_file').files[0];
    const statusDiv = document.getElementById('status');
    const statusText = document.getElementById('status_text');
    const statusSpinner = document.getElementById('status_spinner');
    const startBtn = document.getElementById('start_btn');

    if (!weekNrInput || !fileInput) {
        toonFout("❌ Vul een weeknummer in en selecteer een PDF-bestand.");
        return;
    }

    // Reset status UI naar 'laden'
    statusDiv.className = '';
    statusSpinner.style.display = 'block';
    statusDiv.style.display = 'block';
    startBtn.disabled = true;

    try {
        statusText.innerText = "PDF inlezen...";
        const fileBytes = await fileInput.arrayBuffer();
        const fileBytesCopy = fileBytes.slice(0); 

        const loadingTask = pdfjsLib.getDocument({ data: fileBytesCopy });
        const pdfTextDoc = await loadingTask.promise;
        const totaalPaginas = pdfTextDoc.numPages;
        const laatstePaginaIndex = totaalPaginas - 1;

        const pdfEditDoc = await PDFLib.PDFDocument.load(fileBytes);

        let allePaginasPerGroep = { "G1G2": [], "G3G4": [], "G5G6": [], "LANDELIJK": [] };
        let nfPaginasPerGroep = { "G1G2": [], "G3G4": [], "G5G6": [], "LANDELIJK": [] };
        let landelijkeWeekendPaginas = [];

        // Analyseer elke pagina
        for (let i = 0; i < totaalPaginas; i++) {
            statusText.innerText = `Pagina ${i + 1} van ${totaalPaginas} analyseren...`;
            
            const pageTextObj = await pdfTextDoc.getPage(i + 1);
            const textContent = await pageTextObj.getTextContent();
            let text = textContent.items.map(item => item.str).join(" ").toUpperCase();
            
            const editPage = pdfEditDoc.getPage(i);
            let hasProductLink = false;
            let hasLidlNlLink = false;

            // Scan weblinks via de annotatielaag
            if (editPage.node && editPage.node.Annots) {
                const annots = pdfEditDoc.context.lookup(editPage.node.Annots);
                if (annots && annots.array) {
                    for (const annotRef of annots.array) {
                        const annot = pdfEditDoc.context.lookup(annotRef);
                        if (annot && annot.get) {
                            const a = annot.get(PDFLib.PDFName.of('A'));
                            if (a) {
                                const uri = a.get(PDFLib.PDFName.of('URI'));
                                if (uri) {
                                    const urlStr = uri.value.toLowerCase();
                                    
                                    if (urlStr.includes('lidl.nl')) {
                                        hasLidlNlLink = true;
                                    }
                                    if ((urlStr.includes('/p/') || urlStr.includes('/q/')) && !urlStr.includes('lidlplus')) {
                                        hasProductLink = true;
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // Non-food bepaling logica
            let isNonFood = false;
            if (i !== 0) {
                if (NF_TREFWOORDEN.some(term => text.includes(term)) || hasProductLink || hasLidlNlLink) {
                    isNonFood = true;
                }
                if (FOOD_UITZONDERINGEN.some(u => text.includes(u))) {
                    isNonFood = false;
                }
            }

            // Weekend folder selectie
            if (i === laatstePaginaIndex) {
                landelijkeWeekendPaginas.push(i);
            } else if (text.includes("VANAF VRIJDAG") && !hasProductLink) {
                if (!WEEKEND_UITZONDERINGEN.some(u => text.includes(u))) {
                    landelijkeWeekendPaginas.push(i);
                }
            }

            // Regio groepering (Exacte kopie van de Python logica)
            let behoortTotGroepen = [];
            
            if (text.includes("G1/G2/G3/G4/G5/G6")) {
                behoortTotGroepen = GROEPEN;
            } else if (text.includes("LANDELIJK") && !text.includes("LANDELIJKE")) {
                behoortTotGroepen = ["LANDELIJK"];
            } else if (!([1, 2, 3, 4, 5, 6].some(n => text.includes(`G${n}`)))) {
                behoortTotGroepen = GROEPEN;
            } else {
                for (let n = 1; n <= 6; n++) {
                    if (text.includes(`G${n}`)) {
                        GROEPEN.forEach(groep => {
                            if (groep.includes(`G${n}`) && !behoortTotGroepen.includes(groep)) {
                                behoortTotGroepen.push(groep);
                            }
                        });
                    }
                }
            }

            behoortTotGroepen.forEach(groep => {
                allePaginasPerGroep[groep].push(i);
                if (isNonFood || i === 1) nfPaginasPerGroep[groep].push(i);
            });
        }

        // PDF Bouwen en ZIP aanmaken
        statusText.innerText = "PDF folders genereren...";
        const zip = new JSZip();

        async function voegPdfToeAanZip(regioNaam, paginas, typeFolder) {
            if (!paginas || paginas.length === 0) return;

            let actuelePaginas = [...paginas];
            if (typeFolder === "FOOD") {
                actuelePaginas = actuelePaginas.filter(p => p !== 1 && p !== laatstePaginaIndex);
            } else if (typeFolder === "WEEKEND") {
                let anderePaginas = actuelePaginas.filter(p => p !== laatstePaginaIndex);
                actuelePaginas = actuelePaginas.includes(laatstePaginaIndex) ? [laatstePaginaIndex, ...anderePaginas] : anderePaginas;
            }

            if (actuelePaginas.length === 0) return;

            let bestandsnaam = (typeFolder === "NONFOOD" || typeFolder === "WEEKEND") 
                ? `WK${weekNrInput}_${typeFolder}_${regioNaam}_${JAAR}`
                : `WK${weekNrInput}_${regioNaam}_${JAAR}`;

            const subDocExtern = await PDFLib.PDFDocument.create();
            const gekopieerdePaginasExtern = await subDocExtern.copyPages(pdfEditDoc, actuelePaginas);
            gekopieerdePaginasExtern.forEach(p => subDocExtern.addPage(p));
            
            if (typeFolder === "WEEKEND") {
                await schoonLinksOp(subDocExtern);
                const weekendBytes = await subDocExtern.save();
                zip.file(`LIDL/WEEKEND/${bestandsnaam}_LIDL.pdf`, weekendBytes);
                return;
            }

            const externBytes = await subDocExtern.save();
            zip.file(`EXTERN/${typeFolder}/${bestandsnaam}_EXTERN.pdf`, externBytes);

            const subDocLidl = await PDFLib.PDFDocument.load(externBytes);
            await schoonLinksOp(subDocLidl);
            const lidlBytes = await subDocLidl.save();
            zip.file(`LIDL/${typeFolder}/${bestandsnaam}_LIDL.pdf`, lidlBytes);
        }

        // UTM-verwijderaar
        async function schoonLinksOp(doc) {
            for (const page of doc.getPages()) {
                if (page.node && page.node.Annots) {
                    const annots = doc.context.lookup(page.node.Annots);
                    if (annots && annots.array) {
                        for (const annotRef of annots.array) {
                            const annot = doc.context.lookup(annotRef);
                            if (annot && annot.get) {
                                const a = annot.get(PDFLib.PDFName.of('A'));
                                if (a) {
                                    const uri = a.get(PDFLib.PDFName.of('URI'));
                                    if (uri) {
                                        let urlStr = uri.value;
                                        if (/([?&]utm_[a-z]+=[^&]+)/i.test(urlStr)) {
                                            let schoneUrl = urlStr.split(/[?&]utm_medium/)[0].split(/[?&]utm_source/)[0].split(/[?&]utm_/)[0];
                                            a.set(PDFLib.PDFName.of('URI'), PDFLib.PDFString.of(schoneUrl));
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        for (const naam of GROEPEN) {
            await voegPdfToeAanZip(naam, allePaginasPerGroep[naam], "FOOD");
            await voegPdfToeAanZip(naam, nfPaginasPerGroep[naam], "NONFOOD");
        }
        await voegPdfToeAanZip("LANDELIJK", landelijkeWeekendPaginas, "WEEKEND");

        statusText.innerText = "ZIP-pakket downloaden...";
        const zipContent = await zip.generateAsync({ type: "blob" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(zipContent);
        link.download = `Flyer_Week_${weekNrInput}.zip`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        statusText.innerText = "🎉 Voltooid en gedownload!";
        setTimeout(() => { statusDiv.style.display = 'none'; startBtn.disabled = false; }, 3000);

    } catch (error) {
        console.error(error);
        toonFout("❌ Er ging iets fout bij het verwerken. Open de console (F12) voor meer details.");
        startBtn.disabled = false;
    }
}

function toonFout(bericht) {
    const statusDiv = document.getElementById('status');
    const statusText = document.getElementById('status_text');
    statusDiv.className = 'error';
    statusText.innerText = bericht;
    statusDiv.style.display = 'block';
}
</script>
</body>
</html>
