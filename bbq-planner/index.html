<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Epic BBQ Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <div class="max-w-2xl mx-auto px-4 py-12">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight text-gray-900 mb-2">🔥 Summer BBQ Planner</h1>
            <p class="text-lg text-gray-600">Bring your appetite. Tell us who you are, suggest what we need, and vote on the essentials!</p>
        </div>

        <div class="bg-white rounded-xl shadow-xs border border-gray-100 p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Add a Suggestion</h2>
            <form id="bbqForm" class="space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                        <input type="text" id="guestName" required placeholder="e.g., Marcus" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-orange-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Item Suggestion</label>
                        <input type="text" id="bbqItem" required placeholder="e.g., Brioche Burger Buns" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-orange-500">
                    </div>
                </div>
                <button type="submit" 
                    class="w-full bg-orange-600 hover:bg-orange-700 text-white font-medium py-2 px-4 rounded-lg transition duration-150 cursor-pointer">
                    Submit Suggestion
                </button>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-xs border border-gray-100 p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">The Leaderboard</h2>
                <span class="text-xs text-gray-500">Sorted by highest votes</span>
            </div>
            
            <div id="loading" class="text-center py-6 text-gray-500">Loading feast details...</div>
            <ul id="itemsList" class="divide-y divide-gray-100 hidden">
                </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 1. CONFIGURATION
        const SUPABASE_URL = "https://lpcfgasmetsocpluhcsh.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_xWPJ0Wp3qQ4J6mrWMieFlw_E0QHlkfK";

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM Elements
        const form = document.getElementById('bbqForm');
        const itemsList = document.getElementById('itemsList');
        const loadingEl = document.getElementById('loading');

        // Helper to get array of voted item IDs from local storage
        function getVotedItems() {
            return JSON.parse(localStorage.getItem('bbq_votes') || '[]');
        }

        // 2. FETCH AND RENDER ITEMS
        async function fetchItems() {
            const { data, error } = await db
                .from('bbq_items')
                .select('*')
                .order('votes', { ascending: false });

            if (error) {
                console.error('Error fetching data:', error);
                return;
            }

            loadingEl.classList.add('hidden');
            itemsList.classList.remove('hidden');
            itemsList.innerHTML = '';

            if (data.length === 0) {
                itemsList.innerHTML = `<li class="py-6 text-center text-gray-400">No suggestions yet. Be the first hero!</li>`;
                return;
            }

            const votedItems = getVotedItems();

            data.forEach(row => {
                const hasVoted = votedItems.includes(row.id);
                const li = document.createElement('li');
                li.className = 'py-4 flex items-center justify-between gap-4';
                li.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <p class="text-md font-semibold text-gray-900 truncate">${escapeHtml(row.item)}</p>
                        <p class="text-xs text-gray-500 truncate">Suggested by ${escapeHtml(row.name)}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-sm font-bold text-gray-600 bg-gray-100 px-2.5 py-1 rounded-full">${row.votes} votes</span>
                        <button onclick="upvoteItem(${row.id}, ${row.votes})" 
                            ${hasVoted ? 'disabled' : ''}
                            class="${hasVoted 
                                ? 'bg-gray-100 text-gray-400 border border-gray-200 cursor-not-allowed' 
                                : 'bg-orange-50 hover:bg-orange-100 active:bg-orange-200 text-orange-700 border border-orange-200 cursor-pointer'} 
                                p-2 rounded-lg font-bold transition duration-150">
                            ${hasVoted ? '✓ Voted' : '👍 +1'}
                        </button>
                    </div>
                `;
                itemsList.appendChild(li);
            });
        }

        // 3. SUBMIT NEW ITEM
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('guestName');
            const itemInput = document.getElementById('bbqItem');

            const { data, error } = await db
                .from('bbq_items')
                .insert([{ name: nameInput.value, item: itemInput.value }])
                .select(); // Ask Supabase to return the newly created row details

            if (error) {
                alert('Oops, something went wrong adding your item!');
                console.error(error);
            } else {
                // Automatically count their suggestion as their vote for that item
                if (data && data[0]) {
                    const votedItems = getVotedItems();
                    votedItems.push(data[0].id);
                    localStorage.setItem('bbq_votes', JSON.stringify(votedItems));
                }

                itemInput.value = ''; // clear item field
                fetchItems();
            }
        });

        // 4. UPVOTE AN ITEM
        async function upvoteItem(id, currentVotes) {
            const votedItems = getVotedItems();
            
            // Safety check: block execution if they've already voted for this ID
            if (votedItems.includes(id)) return;

            const { error } = await db
                .from('bbq_items')
                .update({ votes: currentVotes + 1 })
                .eq('id', id);

            if (error) {
                console.error('Error updating votes:', error);
            } else {
                // Add the ID to storage so they can't click it again
                votedItems.push(id);
                localStorage.setItem('bbq_votes', JSON.stringify(votedItems));
                fetchItems();
            }
        }

        // Simple XSS security helper
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // Initial load
        fetchItems();
    </script>
</body>
</html>
